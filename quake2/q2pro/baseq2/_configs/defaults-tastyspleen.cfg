// Key Bindings

unbindall

bind 1 "use Blaster"
bind 2 "use Shotgun"
bind 3 "use Super Shotgun"
bind 4 "use Machinegun"
bind 5 "use Chaingun"
bind 6 "use Grenade Launcher"
bind 7 "use Rocket Launcher"
bind 8 "use HyperBlaster"
bind 9 "use Railgun"
bind 0 "use BFG10K"

bind ~ "toggleconsole"
bind ` "toggleconsole"
bind - "sizedown"
bind = "sizeup"
bind + "sizeup"
bind [ "invprev"
bind ] "invnext"
bind \ "inven"
bind ' "invdrop"

bind a "+moveleft"
bind b "use Rebreather"
bind c "use HyperBlaster"
bind d "+moveright"
bind e "use Chaingun"
bind f "use Rocket Launcher"
bind g "use Grenades"
bind h "wave 0"
bind i "use Invulnerability"
bind j "wave 1"
bind k "wave 2"
bind l "wave 3"
bind m "use Silencer"
bind n "use Environment Suit"
bind o "use Quad Damage"
bind p "use Power Shield"
bind q "score"
bind r "use Railgun"
bind s "+back"
bind t "messagemode"
bind u "wave 4"
bind v "use Grenade Launcher"
bind w "+forward"
bind x "use BFG10K"
bind y "messagemode2"
bind z "use Super Shotgun"

bind TAB "inven"
bind ENTER "invuse"
bind BACKSPACE "invdrop"
bind SPACE "+moveup"
bind PAUSE "pause"
bind ESCAPE "togglemenu"

bind ALT "+zoom"
bind CTRL "+movedown"
bind SHIFT "+speed"

bind UPARROW "invprev"
bind DOWNARROW "invnext"
bind LEFTARROW "invprev"
bind RIGHTARROW "invnext"

bind F1 "help"
bind F2 "pushmenu savegame"
bind F3 "pushmenu loadgame"
bind F4 "pushmenu keys"
bind F5 "pushmenu startserver"
bind F6 "echo Quick Saving...; wait; save quick"
bind F8 "pushmenu servers +http://q2servers.com/?raw=2"
bind F9 "echo Quick Loading...; wait; load quick"
bind F10 "quit"
bind F12 "screenshot"

bind MOUSE1 "+attack"
bind MOUSE2 "+moveup"
bind MOUSE3 "invuse"
bind MWHEELUP "weapprev"
bind MWHEELDOWN "weapnext"


// Console Variables

resetall

seta _gray "#7b7b7b"
seta _lightblue "#0b384d"
seta _ui_coop "0"
seta _ui_maxclients "8"
seta _ui_nextserver "q2dm1"
seta _zoomfov "45"

seta adr0 "tastyspleen.net:27916"
seta adr1 "acmectf.com:27910"
seta adr2 "110.232.118.21:27910"
seta allow_download_players "0"
seta cl_adjustfov "1"
seta cl_http_default_url "http://q2http.tastyspleen.net/"
seta cl_http_max_connections "4"
seta cl_maxfps "100"
seta cl_railcore_color $_gray
seta cl_railspiral_color $_lightblue
seta cl_railtrail_type "2"
seta con_scale "0"
seta gl_anisotropy "0"
seta gl_coloredlightmaps "0.8"
seta gl_fontshadow "1"
seta gl_modulate "2"
seta gl_modulate_entities "100"
seta gl_polyblend "0"
seta gl_shadows "1"
seta gl_swapinterval "0"
seta gl_upscale_pcx "1"
seta hqx_cb "12"
seta hqx_cr "9"
seta intensity "2"
seta r_maxfps "250"
seta rate "15000"
seta s_volume "0.5"
seta scr_scale "0"
seta scr_showturtle "0"
seta ui_colorservers "1"
seta ui_open "1"
seta ui_scale "0"
seta ui_sortservers "5"

seta cl_run "1"
seta crosshair "1"
seta hand "0"
seta lookspring "1"
seta lookstrafe "0"
seta m_forward "1"
seta m_pitch "0.022"
seta m_side "0.8"
seta m_yaw "0.022"
seta name ${random}${random}${random}${random}
seta sensitivity "3"
seta skin "male/grunt"
seta vid_fullscreen "1"
seta viewsize "100"
seta win_noalttab "0"


// Aliases

alias +zoom "if $fov != $_zoomfov then set _old_fov $fov; if $m_autosens != $_old_fov then set _old_m_autosens $m_autosens; fov $_zoomfov; m_autosens $_old_fov" 
alias -zoom "if $fov == $_zoomfov then fov $_old_fov; if $m_autosens == $_old_fov then m_autosens $_old_m_autosens"

alias newgame "killserver; maxclients 1; deathmatch 0; map base1"
alias dedicated_start "map base1"


// Links

exec _configs/defaults-tastyspleen-links.cfg

