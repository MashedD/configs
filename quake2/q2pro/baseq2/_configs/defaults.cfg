//
// Keys
//

// Basic
bind w "+forward"
bind s "+back"
bind a "+moveleft"
bind d "+moveright"
bind CTRL "+movedown"
bind MWHEELDOWN "weapprev"
bind MWHEELUP "weapnext"
bind MOUSE2 "+moveup"

// Fix q2pro menu keys
bind F2 "pushmenu savegame" // not useful in multiplayer
bind F3 "pushmenu loadgame" // not useful in multiplayer
bind F4 "pushmenu keys"
bind F5 "pushmenu startserver"
bind F10 "quit"

//
// Most important defaults
//

// Autorunning
set cl_run "1"

// If you have pak0.pak from demo version, this symlink allows you to start Single Player from menu,
softlink maps/base1.bsp maps/demo1.bsp
softlink maps/ztn2dm2.bsp maps/q2pduel9.bsp
softlink maps/q2rdm2.bsp maps/q2pduel7.bsp
softlink maps/ztn2dm3.bsp maps/q2pduel10.bsp
softlink maps/ztn2dm3.bsp maps/q2duel8.bsp
softlink maps/aerowalk.bsp maps/q2duel1.bsp

//
// Aliases
//

// Double jump
alias +double_jump "+moveup; wait; -moveup; wait; +moveup"
alias -double_jump "-moveup"
// Example usage:
//bind MOUSE2 "+double_jump" // hold Right Mouse Button to perform some jumps easier
//                           // might cause problems when switching observing to next person
//                           // (skips one). "space" performs single jump by default.

// Quick grenade
alias +quick_grenade "use grenades; +attack"
alias -quick_grenade "-attack; weaplast"
// Example usage:
// bind MOUSE3 "+quick_grenade" // hold Middle Mouse Button a little longer
                                // to throw a grenade, release to switch to previous weapon

// Change fov
alias +togglefov "fov 45"
alias -togglefov "fov 105" // Set to your value
// Example usage:
//bind MOUSE4 "+togglefov"

// No more lulz. d1, d2, d3, d4 were aliases to play cinematics/demos in full version
alias d1 ""
alias d2 ""
alias d3 ""
alias d4 ""

//
// Defaults
//

// FPS
set cl_async "1" // better performance than 2
set r_maxfps "1000" // 1000 lowers input lag and is same to "0", but if you accidentally use "0" in r1q2 game will stutter as will have like 1 FPS
set cl_maxfps "120" // great default for many jumps
set cl_warn_on_fps_rounding "0" // disable warning about rounding, for example 120 to 125

//
// Triggers
//

// Auto demo recording
set cl_beginmapcmd "record ${cl_mapname}_${com_date}_${com_time}"

