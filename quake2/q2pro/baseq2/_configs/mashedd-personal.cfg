// Player
//set name "MashedD"
//set hostname "cyberspace87"
set gender "female"
set skin "female/jungle"
set dogtag "quake"

// Mouse
set sensitivity "1.75" // DPI: 1000
set m_autosens "1"

// View
set fov "105"
set hand "2"

// Crosshair
//set crosshair 1
//set ch_red 0.0
//set ch_green 1.0
//set ch_blue 0.0

// UI
set ui_open "1"
set scr_chathud "1"
// 800x600
//set scr_scale "1.5"
//set con_scale "1"
//set ui_scale "1.5"
// FullHD
//set scr_scale "4"
//set con_scale "3"
//set ui_scale "4"

// Graphical Console
set con_clock "1"
set con_timestamps "1"

// Misc
set com_date_format %Y-%m-%d
set com_time_format %H-%M-%S
set cl_noskins "2"
set sys_history "0"
set con_history "0"

// Server settings
set _ui_nextserver "koldduel1"
//set timelimit 0
//set fraglimit 30

//
// Presets
//

alias rail_classic "set cl_railtrail_type 0"
alias rail_modern  "set cl_railtrail_type 2"

alias preset_playing   "set cl_disable_particles 63; set cl_disable_explosions 3; set s_ambient 3; set cl_gibs 0; set gl_polyblend 0; set scr_chathud 1; set cl_stream_scoreboard 0; set fov 105; set hand 2"
alias preset_streaming "set cl_disable_particles 0;  set cl_disable_explosions 0; set s_ambient 1; set cl_gibs 1; set gl_polyblend 1; set scr_chathud 1; set cl_stream_scoreboard 1; set fov 90;  set hand 0; set s_ear_midon 0; set s_underwater 1"

alias scale_800 "set scr_scale 1.1; set con_scale 1;   set ui_scale 1.3"
alias scale_fhd "set scr_scale 2.5; set con_scale 2.5; set ui_scale 3"

alias cross_green_cross "set crosshair 1; set ch_red 0.0; set ch_green 1.0; set ch_blue 0.0"
alias cross_green_dot   "set crosshair 4; set ch_red 0.0; set ch_green 1.0; set ch_blue 0.0"
alias cross_red_square  "set crosshair 5; set ch_red 1.0; set ch_green 0.0; set ch_blue 0.0"

preset_playing
scale_fhd
rail_classic
//cross_green_cross
cross_green_dot
//cross_red_square
set cl_stream_scoreboard "1"
set cl_stream_scoreboard_offset "120"

//set gl_shaders "0"
//set cl_railcore_color "red"
//set cl_railcore_width "1"
//set cl_railspiral_color "white"
//set cl_railspiral_radius "1"
//set cl_railtrail_type "0"

//
// Mods
//

// FIXME: errors on startup
if X${game} eq "X3zb2" then exec _configs/mashedd-mod-3zb2-zigflag.cfg
if X${game} eq "X3zb2-zigflag" then exec _configs/mashedd-mod-3zb2-zigflag.cfg
if X${game} eq "Xjump" then exec _configs/mashedd-mod-jump.cfg
if X${game} eq "Xopentdm" then exec _configs/mashedd-mod-opentdm.cfg

