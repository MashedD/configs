// Effects
set cl_railtrail_type "2"
//set cl_railtrail_time "1.8"
set cl_railcore_color "magenta"
set cl_railspiral_color "blue"
//set cl_railspiral_radius "1.2"
//set cl_gunalpha "0.4"

//set cl_railtrail_type "0" // OG rail
set cl_disable_particles "63" // particles: disable explosions etc.
set cl_disable_explosions "3"

// OpenGL
set vid_gamma "1"
set vid_fullscreen "1"
set intensity "2"
set gl_bloom "1"
set gl_shadows "1"
set gl_shaders "1" // 1 by default, but not in q2repro
set gl_saturation "0.5"
set gl_coloredlightmaps "0.5"
set gl_brightness "0.0"
set gl_modulate "3"
set gl_modulate_world "1.5"
set gl_modulate_entities "1"
set gl_polyblend "0" // don't flash screen when picking up items, being damaged or wearing a quad
set cl_gibs "0"

// Entity lightning
set gl_glowmap_intensity "1"

set gl_swapinterval "0" // less input lag

