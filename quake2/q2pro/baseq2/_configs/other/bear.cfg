
// Configuration file for Barrett Alexander

exec default.cfg

// Standard Input
bind mouse1 +forward
bind mouse2 +mlook
bind mouse3 +attack
sensitivity 5
m_pitch .022
lookstrafe 0
name RamBear
freelook 0
hostname bearhost
skin male/howitzer
cl_run 1
set cheats 1

bind	SPACE		"invnext"
bind 	TAB		"inven"
bind	BACKSPACE	"invdrop"
bind 	CTRL		+moveup
bind    ,		+movedown
bind    ENTER		"invuse"
bind    SHIFT		+speed
bind    LEFTARROW	+back

bind	k		"use Super Shotgun"
bind	m		"use Machinegun"
bind	l		"use Chaingun"
bind	p		"use Rocket Launcher"
bind	'		"use Railgun"
bind	m		"use Machinegun"

bind	o		"use Quad Damage"

bind	.		+moveleft
bind	/		+moveright


set crosshair 3

// Cheat Keys

bind    F2		      "give weapons"
bind	F3		      "giva ammo"
bind    F5                    "give all"
bind    F6                    "r_speeds 0"
bind    F7                    "r_speeds 1"
bind    F8                    "notarget"
bind    F9                    "noclip"
bind    F10                   "god"
bind    F11                   "screenshot"
bind    F12                   "screenshot"



