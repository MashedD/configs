// Configuration file for Paul Jaquays
exec default.cfg

//user profile
set name "Thanatar"
set hostname "The Valley of Shadows"
crosshair 3
set skin male/scout

// Changes to default Input
bind mouse1	+attack
bind mouse2	+strafe 
bind mouse3	+forward
sensitivity 5
freelook 1
cl_run 1
hand 0
m_forward       1
m_side          0.9
lookspring	    0

// Keys
bind	z	+lookdown
bind	a	+lookup
bind	d	+moveup
bind	x	centerview
bind	SPACE	+moveup
bind	PGUP	+lookup
bind	o	use quad damage
bind	 UPARROW               +forward
bind	DOWNARROW	 +back
bind	LEFTARROW             +left
bind	RIGHTARROW	 +right

// F & Cheat Keys
bind    F1		 "cmd help"
bind    F2		"menu_savegame"
bind    F3		"menu_loadgame"
bind    F4                    "give ammo"
bind    F5                    "give weapons"
bind    F6                    "r_speeds 0"
bind    F7                    "r_speeds 1"
bind    F8                    "notarget"
bind    F9                    "noclip"
bind    F10                   "god"
bind    F10		"menu_quit"
bind   F12		"screenshot"