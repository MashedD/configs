//Sean "Redwood" Martin's Config for Quake II
//November 24, 1997

//Set Player Info
set name "Redwood" 
set hostname "Redwood's Dark Forest"
set skin "male/skin_10"
set crosshair "3"
set hand "0"

//Set Movement Keys
bind MOUSE2 "+forward"
bind UPARROW "+forward"
bind ALT "+back"
bind DOWNARROW "+back"
bind LEFTARROW "+left"
bind RIGHTARROW "+right"
bind SPACE "+moveup"
bind d "+moveup"
bind SHIFT "+movedown"
bind c "+movedown"
bind , "+moveleft"
bind . "+moveright"

//Attack Keys
bind MOUSE1 "+attack"
bind CTRL "+attack"

//Mouse Settings
set in_joystick "0"
set in_mouse "1"
set m_pitch "0.022"
set sensitivity "9.000000"
set lookstrafe "0"
set lookspring "0"
set freelook "1"

//Set General Info/Keys
bind ESCAPE "togglemenu"
bind ~ "toggleconsole"
bind ` "toggleconsole"
bind \ "+mlook"
bind a "+lookup"
bind PAUSE "pause"
set msg "1"

//Weapon Changes
bind m "weapprev"
bind / "weapnext"

//Set Weapons Keys
bind 0 "use BFG10K"
bind 1 "use Blaster"
bind 2 "use Shotgun"
bind 3 "use Super Shotgun"
bind 4 "use Machinegun"
bind 5 "use Chaingun"
bind 6 "use Grenade Launcher"
bind 7 "use Rocket Launcher"
bind 8 "use HyperBlaster"
bind 9 "use Railgun"
bind g "use grenades"

//Set Inventory Keys
bind TAB "inven"
bind ] "invnext"
bind [ "invprev"
bind ENTER "invuse"
bind BACKSPACE "invdrop"
bind b "use rebreather"
bind e "use environment suit"
bind i "use invulnerability"
bind q "use quad damage"
bind s "use silencer"

//Set Player Waves
bind h "wave 1"
bind j "wave 3"
bind k "wave 2"
bind l "wave 0"
bind ";" "wave 4"

//Set Communication Keys
bind t "messagemode"
bind w "messagemode2"

//Set Function Keys
bind F1 "cmd help"
bind F2 "menu_savegame"
bind F3 "menu_loadgame"
bind F4 "menu_keys"
bind F5 "menu_startserver"
bind F6 "echo Quick Saving...; wait; save quick"
bind F9 "echo Quick Loading...; wait; load quick"
bind F10 "quit"
bind F12 "screenshot"

//Set Always Run
set cl_run "1"

//Walk While Running
bind z "+speed"

//View Settings
bind - "sizedown"
bind + "sizeup"
bind = "sizeup"
set viewsize "100"

//Keyboard Only Look Settings
bind INS "+klook"
bind DEL "+lookdown"
bind PGDN "+lookup"
bind END "centerview"