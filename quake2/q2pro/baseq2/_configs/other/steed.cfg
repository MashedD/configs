
// Configuration file forPaul Steed

exec default.cfg

// Standard Input
bind mouse1 weapnext
bind mouse2 +forward
bind mouse3 +attack
sensitivity 8
m_pitch .022
lookstrafe 0
name Steed
freelook 1
hostname paulhost
skin male/steed
cl_run 1

bind	SPACE			"invuse"
bind 	TAB			"inven"
bind	BACKSPACE		"invdrop"
bind    \                       +mlook
bind    z                       +lookdown
bind    a                       +lookup
bind 	d			+moveup
bind    c                       +movedown
bind    x                       centerview
bind    PGDN                  +lookdown
bind    PGUP                  +lookup
bind    END                   centerview
bind    ENTER                 +moveup
bind    SHIFT                 +speed
bind    CTRL                  +attack
bind    UPARROW               +moveup
bind    DOWNARROW             +back
bind    LEFTARROW             +moveleft
bind    RIGHTARROW            +moveright




