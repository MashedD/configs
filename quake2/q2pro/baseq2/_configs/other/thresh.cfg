//Dennis "Thresh" Fong's Quake II Config
//November 26, 1997
//Tip of the game:  Don't use a config that you aren't comfortable with.

// Player info
set name "Thresh"
set hostname "Thresh's Server"
set skin "male/pointman"
set crosshair "1"
set hand "0"

// Movement keys
bind a "+moveleft"
bind d "+moveright"
bind w "+forward"
bind s "+back"
bind SPACE "+moveup"
bind ALT "+movedown"

// Basic weapon keys
bind 0 "use BFG10K"
bind 1 "use Blaster"
bind 2 "use Shotgun"
bind 3 "use Super Shotgun"
bind 4 "use Machinegun"
bind 5 "use Chaingun"
bind 6 "use Grenade Launcher"
bind 7 "use Rocket Launcher"
bind 8 "use HyperBlaster"
bind 9 "use Railgun"

// Additional weapon keys
bind MOUSE2 "use Chaingun"
bind e "use Grenade Launcher"
bind r "use Rocket Launcher"
bind f "use HyperBlaster"
bind c "use Railgun"
bind v "use BFG10K"

// Inventory 
bind g "use grenades"
bind F3 "invprev"
bind F4 "invnext"
bind F9 "use silencer"
bind BACKSPACE "invdrop"
bind TAB "inven"
bind ENTER "invuse"

// Controller (mouse) settings
bind MOUSE1 "+attack"
bind MOUSE2 "use Chaingun"
set in_joystick "0"
set in_mouse "1"
set m_filter "1"
set m_pitch "0.022"
set sensitivity "16.000000"
set lookstrafe "0"
set lookspring "0"
set freelook "1"

// Communication settings
bind t "messagemode"
bind y "messagemode2"
bind g "wave 0"
bind F5 "wave 1"
bind F6 "wave 2"
bind F7 "wave 3"
bind F8 "wave 4"

// Other stuff
bind = "sizeup"
bind + "sizeup"
bind - "sizedown"
bind ` "toggleconsole"
bind ~ "toggleconsole"
bind ] "screenshot"
bind PAUSE "pause"
set msg "1"
set cl_run "1"
set viewsize "100"
bind ESCAPE "togglemenu"
set cl_predict "1"

// Function Keys
bind F1 "cmd help"
bind F2 "use silencer"
bind F3 "invprev"
bind F4 "invnext"
bind F5 "wave 1"
bind F6 "wave 2"
bind F7 "wave 3"
bind F8 "wave 4"
bind F10 "quit"
bind F12 "screenshot"