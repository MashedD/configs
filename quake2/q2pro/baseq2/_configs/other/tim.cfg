
// Configuration file for Tim Willits

exec default.cfg

// Standard Input
bind mouse1 +attack
bind mouse2 +strafe 
bind mouse3 +forward
sensitivity 5
m_pitch .022
lookstrafe 0
name Willits
freelook 1
hostname timhost
skin male/sniper
cl_run 1
set cheats 1

bind	SPACE			"invuse"
bind 	TAB			"inven"
bind	BACKSPACE		"invdrop"
bind    \                       +mlook
bind    z                       +lookdown
bind    a                       +lookup
bind 	d			+moveup
bind    c                       +movedown
bind    x                       centerview
bind    PGDN                  +lookdown
bind    PGUP                  +lookup
bind    END                   centerview
bind    ENTER                 +moveup
bind    SHIFT                 +speed
bind    CTRL                  +attack
bind    UPARROW               +forward
bind    DOWNARROW             +back
bind    LEFTARROW             +left
bind    RIGHTARROW            +right

// Cheat Keys

bind    F2		      "give weapons"
bind	F3		      "giva ammo"
bind    F5                    "give all"
bind    F6                    "r_speeds 0"
bind    F7                    "r_speeds 1"
bind    F8                    "notarget"
bind    F9                    "noclip"
bind    F10                   "god"
bind    F11                   "screenshot"
bind    F12                   "quit"



