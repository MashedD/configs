
// Configuration file for Todd

exec default.cfg
exec inv.cfg

// Standard Input
bind mouse1 +attack
bind mouse2 +forward 
bind mouse3 +mlook
sensitivity 8
m_pitch .022
cl_forwardspeed 400
cl_sidespeed 400
cl_backspeed 400
cl_run 1
set lookstrafe 0
name Toddh
color 4 10
lookspring 2000
hostname ToddHost
set freelook 0
set crosshair 1


bind    .			+moveleft
bind    /			+moveright
bind    SHIFT                   "weapnext"
bind    \                       +mlook
bind    z                       +lookdown
bind    a                       +lookup
bind 	d			+moveup
bind	SPACE			+moveup
bind    c                       +movedown
bind	m			+movedown
bind    x                       centerview
bind    PGDN                  +lookdown
bind    PGUP                  +lookup
bind    END                   centerview
bind    ENTER                 "invuse"
bind    CTRL                  +attack
bind    UPARROW               +forward
bind    DOWNARROW             +back
bind	,		      +back
bind    LEFTARROW             +left
bind    RIGHTARROW            +right

// Cheat Keys

bind    F5                    "give all; use super shotgun"
bind    F6                    "r_speeds 0"
bind    F7                    "r_speeds 1"
bind    F8                    "notarget"
bind    F9                    "noclip"
bind    F10                   "god"
bind    F11                   "screenshot"
bind    F12                   "quit"
